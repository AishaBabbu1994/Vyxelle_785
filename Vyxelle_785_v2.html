
<h2 class="sr-only">Herramienta para memorizar textos: adivina cada palabra una por una viendo solo su inicial, con 3 intentos por palabra.</h2>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.container { padding: 1.5rem 0; max-width: 680px; }
.section { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
textarea { width: 100%; min-height: 120px; resize: vertical; font-family: var(--font-sans); font-size: 14px; }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
.line-display { font-size: 15px; line-height: 2.2; font-family: var(--font-mono); background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 1rem; margin-bottom: 1rem; min-height: 3rem; word-break: break-word; }
.word-chip { display: inline-flex; align-items: center; margin: 2px 3px; padding: 2px 8px; border-radius: var(--border-radius-md); font-size: 14px; font-weight: 500; border: 0.5px solid var(--color-border-tertiary); }
.chip-pending { background: var(--color-background-secondary); color: var(--color-text-secondary); }
.chip-active { background: var(--color-background-info); color: var(--color-text-info); border-color: var(--color-border-secondary); }
.chip-correct { background: var(--color-background-success); color: var(--color-text-success); }
.chip-wrong { background: var(--color-background-danger); color: var(--color-text-danger); text-decoration: line-through; }
.chip-skip { background: var(--color-background-danger); color: var(--color-text-danger); font-style: italic; }
.focus-card { background: var(--color-background-secondary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; text-align: center; }
.focus-initial { font-size: 48px; font-weight: 500; color: var(--color-text-primary); font-family: var(--font-mono); line-height: 1; margin-bottom: 6px; }
.focus-meta { font-size: 13px; color: var(--color-text-secondary); }
.tries-dots { display: flex; gap: 6px; justify-content: center; margin: 10px 0 4px; }
.try-dot { width: 12px; height: 12px; border-radius: 50%; }
.try-dot.left { background: var(--color-background-success); border: 1px solid var(--color-text-success); }
.try-dot.used { background: var(--color-border-tertiary); border: 1px solid var(--color-border-secondary); opacity: 0.4; }
.feedback { font-size: 14px; min-height: 1.4em; margin-bottom: 0.75rem; font-weight: 500; text-align: center; }
.feedback.correct { color: var(--color-text-success); }
.feedback.wrong { color: var(--color-text-danger); }
.feedback.skip { color: var(--color-text-secondary); }
.progress { font-size: 13px; color: var(--color-text-secondary); margin-bottom: 0.75rem; }
.stats { display: flex; gap: 16px; flex-wrap: wrap; }
.stat { font-size: 13px; color: var(--color-text-secondary); }
.stat span { font-weight: 500; color: var(--color-text-primary); }
</style>

<div class="container">
  <div class="section" id="setup-section">
    <p style="font-size:13px;color:var(--color-text-secondary);margin-bottom:8px;">Pega o escribe el texto que quieres memorizar:</p>
    <textarea id="text-input" placeholder="Ingresa tu texto aquí..."></textarea>
    <p style="font-size:12px;color:var(--color-text-secondary);margin-top:8px;margin-bottom:12px;">Verás la inicial de cada palabra y deberás adivinarla completa. 3 intentos por palabra.</p>
    <div class="btn-row">
      <button onclick="startSession()">Comenzar práctica ↗</button>
    </div>
  </div>

  <div class="section" id="practice-section" style="display:none;">
    <div class="progress" id="progress-text"></div>
    <div class="line-display" id="line-display"></div>

    <div class="focus-card" id="focus-card">
      <div class="focus-initial" id="focus-initial">—</div>
      <div class="focus-meta" id="focus-meta"></div>
      <div class="tries-dots" id="tries-dots"></div>
    </div>

    <div class="feedback" id="feedback"></div>

    <div class="btn-row" style="margin-bottom:12px;">
      <input type="text" id="guess" placeholder="Escribe la palabra..." style="flex:1;" onkeydown="if(event.key==='Enter')checkGuess()">
      <button onclick="checkGuess()">Verificar</button>
      <button onclick="skipWord()">Saltar</button>
    </div>
    <div class="btn-row">
      <button onclick="resetSession()">Reiniciar</button>
    </div>
    <div style="margin-top:1rem; border-top:0.5px solid var(--color-border-tertiary); padding-top:1rem;">
      <div class="stats">
        <div class="stat">Correctas: <span id="stat-correct">0</span></div>
        <div class="stat">Errores: <span id="stat-wrong">0</span></div>
        <div class="stat">Saltadas: <span id="stat-skip">0</span></div>
      </div>
    </div>
  </div>
</div>

<script>
const MAX_TRIES = 3;
let allWords = [];
let currentIdx = 0;
let currentTries = 0;
let stats = { correct: 0, wrong: 0, skip: 0 };
let wordStates = [];

function getInitial(word) {
  const clean = word.replace(/^[^a-zA-ZÀ-ÿ0-9]*/,'');
  return clean.length ? clean[0].toUpperCase() + '.' : word;
}

function cleanWord(word) {
  return word.replace(/[^a-zA-ZÀ-ÿ0-9]/g,'').toLowerCase();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function startSession() {
  const raw = document.getElementById('text-input').value.trim();
  if (!raw) { alert('Por favor ingresa algún texto.'); return; }
  allWords = raw.split(/\s+/).filter(w => cleanWord(w).length > 0);
  if (!allWords.length) { alert('No se encontraron palabras.'); return; }
  wordStates = allWords.map(w => ({ word: w, status: 'pending' }));
  stats = { correct: 0, wrong: 0, skip: 0 };
  currentIdx = 0;
  currentTries = 0;
  updateStats();
  document.getElementById('setup-section').style.display = 'none';
  document.getElementById('practice-section').style.display = 'block';
  renderAll();
  loadWord();
}

function renderAll() {
  const display = document.getElementById('line-display');
  display.innerHTML = wordStates.map((ws, i) => {
    const initial = escHtml(getInitial(ws.word));
    let cls = 'word-chip ';
    let label = initial;
    if (ws.status === 'correct') { cls += 'chip-correct'; label = escHtml(ws.word); }
    else if (ws.status === 'wrong') { cls += 'chip-wrong'; label = escHtml(ws.word); }
    else if (ws.status === 'skip') { cls += 'chip-skip'; label = escHtml(ws.word); }
    else if (i === currentIdx) cls += 'chip-active';
    else cls += 'chip-pending';
    return '<span class="' + cls + '">' + label + '</span>';
  }).join(' ');
}

function loadWord() {
  if (currentIdx >= allWords.length) { showFinished(); return; }
  currentTries = 0;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('guess').value = '';
  document.getElementById('guess').disabled = false;
  const ws = wordStates[currentIdx];
  const initial = getInitial(ws.word);
  const len = cleanWord(ws.word).length;
  document.getElementById('focus-initial').textContent = initial;
  document.getElementById('focus-meta').textContent = len + ' letra' + (len === 1 ? '' : 's');
  document.getElementById('progress-text').textContent =
    'Palabra ' + (currentIdx + 1) + ' de ' + allWords.length;
  updateDots();
  renderAll();
  document.getElementById('guess').focus();
}

function updateDots() {
  let html = '';
  for (let i = 0; i < MAX_TRIES; i++) {
    html += '<div class="try-dot ' + (i < currentTries ? 'used' : 'left') + '"></div>';
  }
  document.getElementById('tries-dots').innerHTML = html;
}

function checkGuess() {
  if (currentIdx >= allWords.length) return;
  const guess = document.getElementById('guess').value.trim();
  if (!guess) return;
  const ws = wordStates[currentIdx];
  const target = cleanWord(ws.word);
  const guessClean = cleanWord(guess);
  const fb = document.getElementById('feedback');

  if (guessClean === target) {
    fb.textContent = '✓ ¡Correcto!';
    fb.className = 'feedback correct';
    ws.status = 'correct';
    stats.correct++;
    updateStats();
    renderAll();
    setTimeout(() => { currentIdx++; loadWord(); }, 600);
  } else {
    currentTries++;
    updateDots();
    if (currentTries >= MAX_TRIES) {
      fb.textContent = '✗ Era: "' + ws.word + '"';
      fb.className = 'feedback wrong';
      ws.status = 'wrong';
      stats.wrong++;
      updateStats();
      renderAll();
      setTimeout(() => { currentIdx++; loadWord(); }, 900);
    } else {
      fb.textContent = '✗ Incorrecto. ' + (MAX_TRIES - currentTries) + ' intento' + (MAX_TRIES - currentTries === 1 ? ' restante.' : 's restantes.');
      fb.className = 'feedback wrong';
      document.getElementById('guess').value = '';
      document.getElementById('guess').focus();
    }
  }
}

function skipWord() {
  if (currentIdx >= allWords.length) return;
  const ws = wordStates[currentIdx];
  const fb = document.getElementById('feedback');
  fb.textContent = 'Saltada. Era: "' + ws.word + '"';
  fb.className = 'feedback skip';
  ws.status = 'skip';
  stats.skip++;
  updateStats();
  renderAll();
  setTimeout(() => { currentIdx++; loadWord(); }, 700);
}

function resetSession() {
  document.getElementById('setup-section').style.display = 'block';
  document.getElementById('practice-section').style.display = 'none';
}

function updateStats() {
  document.getElementById('stat-correct').textContent = stats.correct;
  document.getElementById('stat-wrong').textContent = stats.wrong;
  document.getElementById('stat-skip').textContent = stats.skip;
}

function showFinished() {
  document.getElementById('focus-initial').textContent = '✓';
  document.getElementById('focus-meta').textContent = 'Texto completado';
  document.getElementById('tries-dots').innerHTML = '';
  document.getElementById('progress-text').textContent = 'Sesión completada';
  document.getElementById('feedback').textContent =
    'Correctas: ' + stats.correct + ' | Errores: ' + stats.wrong + ' | Saltadas: ' + stats.skip;
  document.getElementById('feedback').className = 'feedback correct';
  document.getElementById('guess').disabled = true;
}
</script>
